version: '3.8'

services:
  math-team:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pent-eam-math-team
    volumes:
      - ../AI:/app/AI:ro
      - ../workdir:/app/workdir
      - ~/.openhands:/root/.openhands
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-sonnet-4-5-20250929}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    stdin_open: true
    tty: true
    networks:
      - math-team-net

networks:
  math-team-net:
    driver: bridge